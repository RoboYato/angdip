services:
  postgres:
    image: postgres:15-alpine
    container_name: lms_postgres
    environment:
      POSTGRES_USER: lms_user
      POSTGRES_PASSWORD: lms_password
      POSTGRES_DB: lms_db
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lms_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lms_backend
    environment:
      DATABASE_URL: postgresql://lms_user:lms_password@postgres:5432/lms_db
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: lms_user
      DB_PASSWORD: lms_password
      DB_NAME: lms_db
      PORT: 3000
      NODE_ENV: production
      JWT_SECRET: your_jwt_secret_key_change_in_production_12345
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lms_network
    command: sh -c "npm run migrate && npm run seed && npm start"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lms_frontend
    expose:
      - "8080"
    networks:
      - lms_network

  nginx:
    image: nginx:alpine
    container_name: lms_nginx
    ports:
      - "8888:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - lms_network

volumes:
  postgres_data:

networks:
  lms_network:
    driver: bridge
